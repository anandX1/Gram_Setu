<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard – AI GramSetu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <style>
    .mid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .quick-actions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .qa-btn {
      background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--green);
      font-family: 'Inter', sans-serif; transition: all 0.2s; box-shadow: var(--shadow-sm);
    }
    .qa-btn:hover { background: var(--green-light); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .qa-btn svg { width: 22px; height: 22px; stroke: var(--green); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    
    .worker-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .worker-item:last-child { border-bottom: none; }
    .worker-avatar { width: 38px; height: 38px; background: var(--green-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--green); flex-shrink: 0; }
    .view-all { font-size: 13px; color: var(--green); font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity 0.2s; }
    .view-all:hover { opacity: 0.8; }
    
    .jobs-tbl-head { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1fr; padding: 14px 24px; background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--border); }
    .jobs-tbl-head span { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
    .jobs-tbl-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1fr; padding: 16px 24px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.2s; }
    .jobs-tbl-row:hover { background: rgba(0,0,0,0.01); }
    .jobs-tbl-row:last-child { border-bottom: none; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><svg viewBox="0 0 32 32" fill="none"><circle cx="11" cy="10" r="4" fill="white"/><circle cx="21" cy="10" r="4" fill="white" opacity="0.7"/><path d="M2 26c0-5 4-8 9-8s9 3 9 8" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/><path d="M21 18c3.5 0 7 2.2 7 6.5" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.7"/></svg></div>
    <div class="brand-text"><strong>AI GramSetu</strong><span>Village Admin Portal</span></div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <div class="avatar">DE</div>
    <div class="footer-info"><strong>Development User</strong><span>Postmaster</span></div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div style="display:flex; align-items:center;">
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title"><h1>Dashboard</h1><p>Manage village workforce and job assignments</p></div>
    </div>
    <div class="lang-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> EN</div>
  </div>
  <div class="content">
    
    <div class="stats-grid-4">
      <div class="stat-card"><div><div class="stat-label">Total Workers</div><div class="stat-value" id="statTotal">0</div></div><div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div></div>
      <div class="stat-card"><div><div class="stat-label">Available</div><div class="stat-value green" id="statAvail">0</div></div><div class="stat-icon green"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg></div></div>
      <div class="stat-card"><div><div class="stat-label">Active Jobs</div><div class="stat-value blue" id="statJobs">0</div></div><div class="stat-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div></div>
      <div class="stat-card"><div><div class="stat-label">SMS Sent</div><div class="stat-value orange" id="statSMS">0</div></div><div class="stat-icon"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div></div>
    </div>

    <!-- TABS -->
    <div class="tab-group" style="max-width: 400px;">
      <button class="tab-btn active" onclick="switchTab('overview', this)">Overview</button>
      <button class="tab-btn" onclick="switchTab('register', this)">Register Worker</button>
    </div>

    <!-- TAB 1: OVERVIEW -->
    <div id="tab-overview">
      <div class="mid-row">
        <div class="card" style="padding:22px;">
          <div class="card-title">Quick Actions</div>
          <div class="quick-actions-grid">
            <button class="qa-btn" onclick="window.location.href='jobs.html'"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Post New Job</button>
            <button class="qa-btn" onclick="window.location.href='sms.html'"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Send SMS</button>
            <button class="qa-btn" onclick="window.location.href='reports.html'"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>Reports</button>
          </div>
        </div>
        <div class="card" style="padding:22px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <span class="card-title" style="margin:0;">Recent Workers</span>
            <a class="view-all" href="workers.html">View All &rarr;</a>
          </div>
          <div id="recentWorkers"></div>
        </div>
      </div>

      <div class="card table-card" style="padding:0;">
        <div class="table-header">
          <h3>Active Jobs</h3>
          <button class="btn-green" onclick="window.location.href='jobs.html'"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Job</button>
        </div>
        <div class="jobs-tbl-head"><span>Job Title</span><span>Location</span><span>Workers</span><span>Pay Rate</span><span>Status</span><span>Actions</span></div>
        <div id="jobsTable"></div>
      </div>
    </div>

    <!-- TAB 2: REGISTER -->
    <div id="tab-register" style="display:none; max-width: 600px; margin: 0 auto;">
      <div class="card">
        <div class="card-title" style="display:flex;align-items:center;gap:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Register New Worker</div>
        <div class="field"><label>Full Name</label><input id="wName" placeholder="Enter worker name"/></div>
        <div class="field"><label>Phone Number</label><input id="wPhone" placeholder="+91XXXXXXXXXX"/></div>
        <div class="field"><label>Primary Skill Sector</label>
          <select id="wSkill">
            <option value="">Select official sector</option>
            <option>Agriculture</option><option>Domestic Help</option><option>Construction</option>
            <option>Healthcare</option><option>Beauty and Wellness</option>
            <option>Textile and Clothing</option><option>Retail</option>
          </select>
        </div>
        <div class="field"><label>Experience (Years)</label><input id="wExp" type="number" value="0" min="0"/></div>
        <div class="field"><label>Availability</label><select id="wAvail"><option>Available</option><option>Busy</option><option>On Leave</option></select></div>
        <button class="btn-green" style="margin-top:10px;" onclick="registerWorker()">
          Register Worker
        </button>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>
<script src="../assets/js/main.js"></script>
<script>
  buildSidebar('dashboard');
  const API = localStorage.getItem('API_BASE') || 'http://localhost:3000';

  function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-overview').style.display = tabId === 'overview' ? 'block' : 'none';
    document.getElementById('tab-register').style.display = tabId === 'register' ? 'block' : 'none';
  }

  async function refreshUI() {
    const db = getDB(), workers = db.workers||[], localJobs = db.jobs||[], sms = db.sms||[];

    let empJobs = [];
    try {
      const r = await fetch(API + '/employer/jobs-all');
      if (r.ok) { const d = await r.json(); empJobs = d.jobs || []; }
    } catch(e) {}

    const normEmpJobs = empJobs.map(j => ({
      id         : j.id,
      title      : j.title,
      location   : j.location,
      workers    : j.workersNeeded || 1,
      payRate    : j.payRate || 0,
      status     : j.status,
      _source    : 'employer'
    }));

    const allJobs = [...localJobs, ...normEmpJobs];

    document.getElementById('statTotal').textContent = workers.length;
    document.getElementById('statAvail').textContent = workers.filter(w=>w.availability==='Available').length;
    document.getElementById('statJobs').textContent  = allJobs.filter(j=>j.status==='Open'||j.status==='Assigned').length;
    document.getElementById('statSMS').textContent   = sms.reduce((a,s)=>a+(s.recipients||0),0);

    const rw = document.getElementById('recentWorkers'), recent = workers.slice(0,5);
    rw.innerHTML = !recent.length
      ? `<div class="empty-state" style="padding:20px 0;"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><p>No workers registered yet</p></div>`
      : recent.map(w=>`<div class="worker-item"><div class="worker-avatar">${getInitials(w.name)}</div><div style="flex:1;"><strong style="font-size:14px; color:var(--text-dark);">${w.name}</strong><div style="font-size:12px;color:var(--text-muted); margin-top: 2px;">${w.skill} &bull; ${w.experience}yr</div></div><span class="badge ${w.availability==='Available'?'badge-green':'badge-orange'}">${w.availability}</span></div>`).join('');

    const jt = document.getElementById('jobsTable');
    const activeJobs = allJobs.filter(j=>j.status==='Open'||j.status==='Assigned').slice(0,8);
    jt.innerHTML = !activeJobs.length
      ? `<div class="empty-state" style="padding:30px 0;"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg><p>No active jobs</p></div>`
      : activeJobs.map(j=>`<div class="jobs-tbl-row">
          <div><strong style="font-size:14px; color:var(--text-dark);">${j.title}</strong>${j._source==='employer'?'<span style="font-size:10px;background:var(--green-light);color:var(--green);padding:2px 8px;border-radius:99px;margin-left:8px;font-weight:700;">Employer</span>':''}</div>
          <span style="font-size:13px;">${j.location}</span>
          <span style="font-size:13px;">${j.workers}</span>
          <span style="font-size:13px; font-weight: 600;">₹${j.payRate}/day</span>
          <span class="badge ${j.status==='Open'?'badge-blue':j.status==='Completed'?'badge-green':'badge-orange'}">${j.status}</span>
          <a href="jobs.html" style="font-size:13px;color:var(--green);font-weight:600;text-decoration:none;">View</a>
        </div>`).join('');
  }

  function registerWorker(){
    const name=document.getElementById('wName').value.trim(),phone=document.getElementById('wPhone').value.trim(),skill=document.getElementById('wSkill').value;
    if(!name||!phone||!skill){showToast('Fill Name, Phone & Skill','error');return;}
    const db=getDB();
    db.workers.unshift({id:Date.now(),name,phone,skill,experience:parseInt(document.getElementById('wExp').value)||0,availability:document.getElementById('wAvail').value,registeredAt:new Date().toISOString()});
    saveDB(db);
    ['wName','wPhone'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('wSkill').value=''; document.getElementById('wExp').value='0';
    showToast('✅ Worker registered!'); 
    switchTab('overview', document.querySelector('.tab-btn'));
    refreshUI();
  }

  refreshUI();
</script>
</body>
</html>
